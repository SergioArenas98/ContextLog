name: context_log
description: "ContextLog — Archaeological field recording app for Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (SQLite via Drift)
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # Immutable models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.2

  # Utilities
  uuid: ^4.5.1

  # Camera / image
  image_picker: ^1.1.2

  # Graph visualization (Harris Matrix layout)
  graphview: ^1.2.0

  # Icons
  cupertino_icons: ^1.0.8

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.13.1
  drift_dev: ^2.28.0
  freezed: ^3.1.0
  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
